name: SC measurements (feature 019 / T091, T129, T130)

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [019-plugin-native-arch, master, main]
  workflow_dispatch:

jobs:
  measure-sc004:
    name: SC-004 always-on context tokens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Measure SC-004 always-on tokens
        id: measure
        run: |
          python scripts/measure_always_on.py | tee sc004.json
      - name: Assert SC-004 budget
        run: |
          python -c "
          import json, sys
          data = json.load(open('sc004.json'))
          ok = data['sc004_band_pass'] and data['sc004_reduction_pass']
          if not ok:
            print('SC-004 FAIL:', data, file=sys.stderr)
            sys.exit(1)
          print(f\"SC-004 PASS: {data['total_tokens']} tokens ({data['reduction_pct_vs_baseline']}% reduction)\")
          "
      - name: Upload measurement JSON
        uses: actions/upload-artifact@v4
        with:
          name: sc004-measurement-${{ github.sha }}
          path: sc004.json

  quickstart-3os:
    name: Quickstart 3-OS smoke (T130)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Quickstart steps (no host CLI required)
        shell: bash
        run: |
          set -ex
          # Use runner-temp on Windows; /tmp on POSIX. RUNNER_TEMP is set by the
          # actions/setup-python runner across all platforms.
          QUICKSTART_DIR="${RUNNER_TEMP}/quickstart"
          mkdir -p "$QUICKSTART_DIR" && cd "$QUICKSTART_DIR"

          # Create a minimal .NET solution fixture
          touch MyApp.sln
          mkdir -p src
          cat > src/MyApp.csproj <<'EOF'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>net8.0</TargetFramework>
            </PropertyGroup>
          </Project>
          EOF

          # Step 1: dotnet-ai init with explicit ProjectMetadata fields.
          # Feature 019 / commit 20 / T146-T153 (B-3) made --company/--domain/--side
          # the canonical source of ProjectMetadata; without them init won't
          # write a valid project.yml that downstream render/migrate can consume.
          # ci/019-plugin-native-arch commit 33: added --company/--domain/--side.
          # commit 42: also added `--type generic` — the project.yml writer at
          # cli.py:964 is gated by `if detected:`, and `detected` is only
          # populated when `--type` is explicit (cli.py:849). Without `--type`
          # init silently skipped the project.yml write and downstream render
          # exited 22.
          dotnet-ai init "$QUICKSTART_DIR" \
            --ai claude \
            --type generic \
            --company "QuickstartCo" \
            --domain "Quickstart" \
            --side "server" \
            --json

          # Step 2: dotnet-ai check
          dotnet-ai check "$QUICKSTART_DIR" --json || true   # check may report yellow if codebase-memory-mcp not present; not a blocker

          # Step 3: dotnet-ai render skill async-patterns
          dotnet-ai render skill async-patterns --project "$QUICKSTART_DIR"

          # Step 4: dotnet-ai migrate --dry-run
          dotnet-ai migrate "$QUICKSTART_DIR" --dry-run

          echo "T130 quickstart PASS on ${{ matrix.os }}"
