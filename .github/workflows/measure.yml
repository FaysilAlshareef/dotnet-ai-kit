name: SC measurements (feature 019 / T091, T129, T130)

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [019-plugin-native-arch, master, main]
  workflow_dispatch:

jobs:
  measure-sc004:
    name: SC-004 always-on context tokens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Measure SC-004 always-on tokens
        id: measure
        run: |
          python scripts/measure_always_on.py | tee sc004.json
      - name: Assert SC-004 budget
        run: |
          python -c "
          import json, sys
          data = json.load(open('sc004.json'))
          ok = data['sc004_band_pass'] and data['sc004_reduction_pass']
          if not ok:
            print('SC-004 FAIL:', data, file=sys.stderr)
            sys.exit(1)
          print(f\"SC-004 PASS: {data['total_tokens']} tokens ({data['reduction_pct_vs_baseline']}% reduction)\")
          "
      - name: Upload measurement JSON
        uses: actions/upload-artifact@v4
        with:
          name: sc004-measurement-${{ github.sha }}
          path: sc004.json

  quickstart-3os:
    name: Quickstart 3-OS smoke (T130)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Quickstart steps (no host CLI required)
        shell: bash
        run: |
          set -ex
          # Create a fixture solution
          mkdir -p /tmp/quickstart && cd /tmp/quickstart
          touch MyApp.sln
          mkdir -p src
          echo '<Project Sdk="Microsoft.NET.Sdk"><PropertyGroup><TargetFramework>net8.0</TargetFramework></PropertyGroup></Project>' > src/MyApp.csproj

          # Step 1: dotnet-ai init --ai claude (host CLI not required for init)
          dotnet-ai init --ai claude --json

          # Step 2: dotnet-ai check
          dotnet-ai check --json || true   # check may report yellow if codebase-memory-mcp not present; not a blocker

          # Step 3: dotnet-ai render skill async-patterns
          dotnet-ai render skill async-patterns --project /tmp/quickstart

          # Step 4: dotnet-ai migrate --dry-run
          dotnet-ai migrate /tmp/quickstart --dry-run

          echo "T130 quickstart PASS on ${{ matrix.os }}"
