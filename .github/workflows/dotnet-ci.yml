name: dotnet-ci (v2)

# v2 .NET 10 rewrite CI (feature 020). Separate from the v1 Python ci.yml.
on:
  push:
    branches: ["020-v2-net10-rewrite", "master"]
    paths:
      - "src/**"
      - "tests/**"
      - "artifacts/**"
      - "build/**"
      - "Directory.Build.props"
      - "Directory.Packages.props"
      - "global.json"
      - "dotnet-ai-kit.slnx"
      - ".github/workflows/dotnet-ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "artifacts/**"
      - "build/**"
      - "Directory.Build.props"
      - "Directory.Packages.props"
      - "global.json"
      - "dotnet-ai-kit.slnx"
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore dotnet-ai-kit.slnx
      - name: Build
        run: dotnet build dotnet-ai-kit.slnx --no-restore -c Release -warnaserror
      - name: Format check
        run: dotnet format dotnet-ai-kit.slnx --verify-no-changes --no-restore
      - name: Test
        run: dotnet test dotnet-ai-kit.slnx --no-build -c Release

  drift-gate:
    # Asserts the committed build/ outputs match a fresh `generate` (no drift). Activated in P3.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Regenerate host outputs
        run: dotnet run --project src/DotnetAiKit.Cli -c Release -- generate --out build/
      - name: Assert no drift
        run: git diff --exit-code build/
