name: CI Branch Validation

# Feature 019 / commit 32: dedicated push-driven validation for the
# `ci/**` integration branches (in particular `ci/019-plugin-native-arch`).
#
# Purpose: give the maintainer fast, focused feedback on CI-only changes
# without polluting the main `CI` workflow or requiring PR/workflow_dispatch.
# This workflow runs lint + the full unit/contract suite on the 3-OS matrix
# (no smoke, no full Python matrix) so each push completes in a few minutes.
#
# The heavier `CI` workflow (`.github/workflows/ci.yml`) also fires on push
# to `ci/**` for the complete 3-OS × 3-Python matrix + smoke; this lighter
# workflow is a fast-feedback companion.

on:
  push:
    branches:
      - "ci/**"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-branch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint + Unit/Contract (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-cov build
          pip install -e .

      - name: Lint with ruff
        run: python -m ruff check src/ tests/ scripts/

      - name: Format check with ruff
        run: python -m ruff format --check src/ tests/ scripts/

      - name: Run static + unit suite via scripts/check.py
        run: python scripts/check.py --cov=dotnet_ai_kit --cov-report=term-missing --cov-fail-under=85 -q

      - name: Doc-lint (stale phrases + broken links)
        run: python scripts/doc_lint.py
        shell: bash

  pass:
    name: CI Branch Pass
    runs-on: ubuntu-latest
    needs: validate
    if: always()
    steps:
      - name: Aggregate matrix result
        run: |
          if [ "${{ needs.validate.result }}" != "success" ]; then
            echo "::error::validate matrix did not succeed: ${{ needs.validate.result }}"
            exit 1
          fi
          echo "All matrix entries green."
