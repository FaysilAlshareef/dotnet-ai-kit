name: CI

on:
  push:
    branches: [master, development]
  pull_request:
    branches: [master, development]
  schedule:
    # Nightly smoke run at 04:00 UTC. Requires the `claude` CLI on the runner.
    - cron: "0 4 * * *"

jobs:
  static-unit:
    name: Static + Unit (every PR)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install ruff pytest pytest-cov
          pip install -e .

      - name: Lint with ruff
        run: python -m ruff check src/ tests/ scripts/

      - name: Format check with ruff
        run: python -m ruff format --check src/ tests/ scripts/

      - name: Run static + unit suite via scripts/check.py (FR-038 / SC-009)
        run: python scripts/check.py --cov=dotnet_ai_kit --cov-report=term-missing --cov-fail-under=85 -q

  smoke:
    # Smoke tests need a real `claude` CLI. They run when the PR carries the
    # [smoke] label OR on the nightly schedule above. (FR-029)
    name: Smoke (gated)
    if: github.event_name == 'schedule' || contains(github.event.pull_request.labels.*.name, 'smoke')
    runs-on: ubuntu-latest
    needs: static-unit
    env:
      CLAUDE_CODE_SMOKE: "1"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pytest
          pip install -e .

      - name: Run smoke suite
        run: python -m pytest tests/smoke -q
