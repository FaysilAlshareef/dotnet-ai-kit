name: CI

# dotnet-ai-kit v2 — .NET 10 CI. Replaces the v1 Python workflows.
on:
  push:
    branches: [master, "0[0-9][0-9]-*", "ci/**"]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore dotnet-ai-kit.slnx
      - name: Build (warnings as errors)
        run: dotnet build dotnet-ai-kit.slnx --no-restore -c Release -warnaserror
      - name: Test
        run: dotnet test dotnet-ai-kit.slnx --no-build -c Release

  format:
    name: format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet format dotnet-ai-kit.slnx --verify-no-changes

  drift-gate:
    name: generate drift gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Regenerate host outputs
        run: dotnet run --project src/DotnetAiKit.Cli -c Release -- generate --out build/
      - name: Assert no drift
        run: git diff --exit-code build/

  pack:
    name: pack dotnet tool
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Pack
        run: dotnet pack src/DotnetAiKit.Cli/DotnetAiKit.Cli.csproj -c Release -o ./nupkg
      - uses: actions/upload-artifact@v4
        with:
          name: dotnet-ai-tool
          path: ./nupkg/*.nupkg
          if-no-files-found: warn
