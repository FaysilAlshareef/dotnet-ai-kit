name: Smoke

# Feature 019 / commit 22 / B-7 (T157-T160): smoke job runs the 4 feature-019
# host fixtures (Claude, Claude+LSP, Codex, Cursor) across the 3-OS matrix
# required by A-010 / SC-008.
#
# ci/019-plugin-native-arch commit 39: extracted from `.github/workflows/ci.yml`
# into its own workflow so the main CI workflow can complete fast on every
# push (static + unit only, 3-OS × 3-Python matrix). Smoke runs in parallel
# as its own workflow, with its own status check.
#
# Triggers:
#   - push to `ci/**`         — INFORMATIONAL mode (continue-on-error in fixtures)
#   - workflow_dispatch       — STRICT mode (T200 release gate)
#   - schedule (nightly 04 UTC) — STRICT mode
#   - PR labelled `smoke`     — STRICT mode (maintainer opt-in)
#
# Mode-switching is handled inside the preflight + fixture-run steps via the
# `IS_STRICT` env (computed from `github.event_name`); see comments below.

on:
  push:
    branches:
      - "ci/**"
  pull_request:
    # Only fire on PRs explicitly labelled `smoke` (handled via `if:` below).
    types: [labeled, synchronize, reopened, opened]
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke (${{ matrix.os }})
    # Skip pull_request events unless the PR carries the `smoke` label.
    if: >-
      github.event_name == 'workflow_dispatch'
      || github.event_name == 'schedule'
      || (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/ci/'))
      || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'smoke'))
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    env:
      CLAUDE_CODE_SMOKE: "1"
      CODEX_SMOKE: "1"
      CURSOR_SMOKE: "1"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -e .

      # T158: provision the 4 host binaries on each runner OS.
      # Claude: official npm package (cross-platform, no interactive prompts).
      # Codex: official npm package.
      # Cursor: user-writable path (~/.local/bin/cursor) — /usr/local/bin needs sudo.
      # csharp-ls: dotnet global tool.
      - name: Install Claude Code CLI (npm, all OSes)
        run: npm install -g @anthropic-ai/claude-code || true
        shell: bash

      - name: Install Codex CLI (npm, all OSes)
        run: npm install -g @openai/codex || true
        shell: bash

      - name: Install Cursor CLI (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p "$HOME/.local/bin"
          case "${{ runner.os }}" in
            Linux)
              curl -fsSL https://downloads.cursor.com/production/cli/linux/x64/cursor -o "$HOME/.local/bin/cursor" || true
              ;;
            macOS)
              curl -fsSL https://downloads.cursor.com/production/cli/darwin/x64/cursor -o "$HOME/.local/bin/cursor" || true
              ;;
          esac
          chmod +x "$HOME/.local/bin/cursor" 2>/dev/null || true
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install csharp-ls (dotnet tool)
        shell: bash
        run: |
          dotnet tool install -g csharp-ls || true
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      # T159 preflight — dual mode:
      #   STRICT          : missing binary → ::error:: + exit 1 (T200 gate)
      #   INFORMATIONAL   : missing binary → ::warning:: + continue
      # Always logs "found" / "missing" per-binary lines.
      - name: Preflight — verify smoke binaries on PATH
        shell: bash
        env:
          IS_STRICT: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'smoke')) }}
        run: |
          missing=0
          for bin in claude codex cursor csharp-ls; do
            if ! command -v "$bin" >/dev/null 2>&1; then
              if [ "$IS_STRICT" = "true" ]; then
                echo "::error::missing $bin on PATH; smoke job cannot validate ${bin}'s plugin pathway"
              else
                echo "::warning::missing $bin on PATH; pytest will self-skip the ${bin} smoke fixture (informational mode — ci/** push)"
              fi
              missing=$((missing + 1))
            else
              echo "found $bin: $(command -v "$bin")"
            fi
          done
          if [ "$missing" -gt 0 ]; then
            if [ "$IS_STRICT" = "true" ]; then
              echo "::error::$missing binaries missing — failing the smoke job (T159 strict mode)"
              exit 1
            else
              echo "::warning::$missing binaries missing — running smoke in degraded mode (T159 informational mode)"
            fi
          fi

      # T160: run the 4 feature-019 smoke fixtures.
      #   - `--rootdir .` pins pytest's rootdir to the checkout root so
      #     Windows runners don't walk up to `D:\System Volume Information`.
      #   - `continue-on-error: true` in INFORMATIONAL mode so fixture
      #     failures (CLI surface drift, missing host-installed plugin)
      #     don't fail the job. STRICT mode keeps the hard-fail for T200.
      - name: Run feature-019 smoke fixtures
        shell: bash
        continue-on-error: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/heads/ci/') }}
        run: |
          python -m pytest -q --rootdir . \
            tests/integration/test_smoke_claude.py \
            tests/integration/test_smoke_claude_lsp.py \
            tests/integration/test_smoke_codex.py \
            tests/integration/test_smoke_cursor.py
