name: Bug Report
description: Report a bug in dotnet-ai-kit
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: dotnet-ai-kit version
      description: Run `dotnet-ai --version` to get the version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the tool is affected?
      options:
        - CLI (init, configure, check, upgrade)
        - Slash commands (specify, plan, implement, etc.)
        - Detection (project type, architecture)
        - Profiles (architecture enforcement)
        - Hooks (bash-guard, edit-format, etc.)
        - Permissions (settings.json)
        - Multi-repo (sibling linking, briefs)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior
      placeholder: |
        1. Run `dotnet-ai init`
        2. Run `dotnet-ai configure --company Acme`
        3. See error...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error output or logs
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Project type, .NET version, AI tool used, etc.
