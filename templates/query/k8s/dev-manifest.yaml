apiVersion: v1
kind: Namespace
metadata:
  name: {{ company }}-{{ domain }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ company }}-{{ domain }}-queries-secrets
  namespace: {{ company }}-{{ domain }}
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: "___CONNECTION_STRING___"
  ServiceBus__ConnectionString: "___SERVICEBUS_CONNECTION___"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ company }}-{{ domain }}-queries
  namespace: {{ company }}-{{ domain }}
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: {{ company }}-{{ domain }}-queries
  template:
    metadata:
      labels:
        app: {{ company }}-{{ domain }}-queries
    spec:
      containers:
      - name: {{ company }}-{{ domain }}-queries
        image: "___ACR_NAME___.azurecr.io/{{ company }}-{{ domain }}-queries:___IMAGE_TAG___"
        ports:
        - containerPort: 8080
        envFrom:
        - secretRef:
            name: {{ company }}-{{ domain }}-queries-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ company }}-{{ domain }}-queries
  namespace: {{ company }}-{{ domain }}
spec:
  selector:
    app: {{ company }}-{{ domain }}-queries
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP
