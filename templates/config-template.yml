# dotnet-ai-kit Configuration
# Generated by dotnet-ai init
# Documentation: https://github.com/dotnet-ai-kit/dotnet-ai-kit

# Schema version — do not change
version: "1.0"

# Company-level settings used across all commands and templates
company:
  # Required. Used in C# namespaces (must be a valid C# identifier)
  name: ""
  # GitHub organization name (for cloning repos)
  github_org: ""
  # Default git branch for new branches and PRs
  default_branch: "main"

# Naming convention patterns
# Available placeholders: {Company}, {Domain}, {Side}, {Layer}
naming:
  # Domain name used in template rendering (e.g., "Draw", "Order", "Invoice")
  # This replaces the {Domain} placeholder in patterns below
  domain: "Domain"
  # Solution file naming pattern
  solution: "{Company}.{Domain}.{Side}"
  # Service Bus topic naming pattern (lowercase)
  topic: "{company}-{domain}-{side}"
  # C# namespace pattern
  namespace: "{Company}.{Domain}.{Side}.{Layer}"

# Repository paths for microservice roles
# Each value is either:
#   - A local filesystem path (absolute or relative)
#   - A GitHub reference: github:org/repo
#   - null if not configured
repos:
  command: null
  query: null
  processor: null
  gateway: null
  controlpanel: null

# External tool integrations
integrations:
  coderabbit:
    # Enable CodeRabbit integration for automated code review
    enabled: false
    # Automatically apply CodeRabbit fix suggestions
    auto_fix: false
    # Minimum severity level: info, warning, error
    severity_threshold: "warning"

# Permission level for AI tool operations
# Levels:
#   minimal  — Only build/test commands (everything else requires confirmation)
#   standard — Build, test, git, gh CLI (recommended)
#   full     — All operations in working directory
permissions_level: "standard"

# AI tools configured for this project
# Supported: claude
ai_tools:
  - claude

# Command file style
# Options:
#   full  — Only full command names (dotnet-ai.specify)
#   short — Only short aliases (dai.specify)
#   both  — Both full and short names
command_style: "both"
